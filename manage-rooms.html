<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Rooms - StayEase</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-header">
  <div class="container">
    <h1>🛏️ Manage Rooms</h1>
    <p><strong id="manage-hotel-name"></strong> — <span id="manage-hotel-loc"></span></p>
  </div>
</div>
<section class="section" style="padding-top:2rem;">
  <div class="container" id="rooms-content">
    <div style="display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;">
      <a href="owner-dashboard.html" class="btn btn-outline btn-sm">← Back to Dashboard</a>
      <a href="manage-bookings.html" class="btn btn-outline btn-sm">📋 Manage Bookings</a>
    </div>
    <div class="rooms-table-card">
      <div class="rooms-card-header">
        <h3 style="font-size:1rem;color:var(--text);">Room Types</h3>
        <button id="add-room-btn" class="btn btn-primary btn-sm">+ Add Room</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th><th>Room Name</th><th>Bed Type</th><th>Size</th>
              <th>Capacity</th><th>Price/Night</th><th>Availability</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="rooms-table-body">
            <tr><td colspan="8" class="text-center" style="padding:2rem;color:var(--text-muted);">Loading rooms...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/hotels.js"></script>
<script src="assets/js/booking.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initPage();
    initManageRoomsPage();
  });
</script>
</body>
</html>
