<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Hotels & Resorts - StayEase</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-header">
  <div class="container">
    <h1>🏨 Hotels & Resorts</h1>
    <p>Explore our curated collection of exceptional properties</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <!-- Filter tabs -->
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button class="hotels-filter-btn btn btn-outline btn-sm active" data-category="all">All Properties</button>
        <button class="hotels-filter-btn btn btn-outline btn-sm" data-category="hotel">Hotels</button>
        <button class="hotels-filter-btn btn btn-outline btn-sm" data-category="resort">Resorts</button>
        <button class="hotels-filter-btn btn btn-outline btn-sm" data-category="boutique">Boutique</button>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span id="hotels-count" style="font-size:0.875rem;color:var(--text-light);"></span>
        <select id="hotels-sort" class="form-control" style="width:180px;font-size:0.85rem;">
          <option value="popular">Most Popular</option>
          <option value="rating">Top Rated</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="newest">Newest First</option>
        </select>
      </div>
    </div>
    <div id="hotels-grid" class="hotels-grid"></div>
    <div id="hotels-pagination"></div>
  </div>
</section>

<div id="footer-placeholder"></div>
<button class="reset-demo-btn" onclick="resetDemoData()">🔄 Reset Demo</button>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/hotels.js"></script>
<script src="assets/js/booking.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', initHotelsPage);
</script>
</body>
</html>
