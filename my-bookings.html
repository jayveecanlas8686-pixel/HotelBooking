<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - StayEase</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-header"><div class="container"><h1>📋 My Bookings</h1><p>View and manage all your reservations</p></div></div>
<section class="section">
  <div class="container">
    <div class="bookings-filter-tabs">
      <button class="bookings-filter-btn active" data-status="all">All Bookings</button>
      <button class="bookings-filter-btn" data-status="confirmed">Confirmed</button>
      <button class="bookings-filter-btn" data-status="checked-in">Checked In</button>
      <button class="bookings-filter-btn" data-status="completed">Completed</button>
      <button class="bookings-filter-btn" data-status="cancelled">Cancelled</button>
    </div>
    <div id="my-bookings-list"></div>
  </div>
</section>
<div id="footer-placeholder"></div>
<button class="reset-demo-btn" onclick="resetDemoData()">🔄 Reset Demo</button>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/hotels.js"></script>
<script src="assets/js/booking.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initPage();
    initMyBookingsPage();
  });
</script>
</body>
</html>
