<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - StayEase</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-header"><div class="container"><h1>My Profile</h1><p>Manage your account details and preferences</p></div></div>
<section class="section">
  <div class="container">
    <div class="profile-layout">
      <!-- Profile Card -->
      <div>
        <div class="profile-card">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-name" id="profile-name">Loading...</div>
          <div class="profile-role" id="profile-role"></div>
          <div style="font-size:0.82rem;color:var(--text-muted);">Member since <span id="member-since"></span></div>
          <div style="font-size:0.82rem;color:var(--text-light);margin-top:0.25rem;" id="profile-email"></div>
          <div class="profile-stats">
            <div class="profile-stat"><div class="val" id="stat-bookings">0</div><div class="lbl">Bookings</div></div>
            <div class="profile-stat"><div class="val" id="stat-reviews">0</div><div class="lbl">Reviews</div></div>
            <div class="profile-stat"><div class="val" id="stat-wishlist">0</div><div class="lbl">Saved</div></div>
            <div class="profile-stat"><div class="val" id="stat-spent">$0</div><div class="lbl">Total Spent</div></div>
          </div>
        </div>
        <div style="margin-top:1rem;display:flex;flex-direction:column;gap:0.5rem;">
          <a href="my-bookings.html" class="btn btn-outline" style="width:100%;">📋 My Bookings</a>
          <a href="wishlist.html" class="btn btn-outline" style="width:100%;">❤️ My Wishlist</a>
          <a href="reviews.html" class="btn btn-outline" style="width:100%;">⭐ My Reviews</a>
          <button onclick="handleLogout()" class="btn btn-danger" style="width:100%;">🚪 Sign Out</button>
        </div>
      </div>
      <!-- Edit Forms -->
      <div>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-header"><h3 style="color:var(--text);font-size:1rem;">Personal Information</h3></div>
          <div class="card-body">
            <form id="profile-form">
              <div class="form-row">
                <div class="form-group">
                  <label>Full Name</label>
                  <input type="text" id="pf-name" class="form-control" placeholder="Your full name">
                </div>
                <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" id="pf-email" class="form-control" disabled style="background:var(--bg);">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Phone Number</label>
                  <input type="tel" id="pf-phone" class="form-control" placeholder="+1 555-0100">
                </div>
                <div class="form-group">
                  <label>Nationality</label>
                  <input type="text" id="pf-nationality" class="form-control" placeholder="e.g. Filipino">
                </div>
              </div>
              <div class="form-group">
                <label>Address</label>
                <input type="text" id="pf-address" class="form-control" placeholder="Your address">
              </div>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3 style="color:var(--text);font-size:1rem;">Change Password</h3></div>
          <div class="card-body">
            <form id="password-form">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="current-pw" class="form-control" placeholder="Enter current password">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>New Password</label>
                  <input type="password" id="new-pw" class="form-control" placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                  <label>Confirm New Password</label>
                  <input type="password" id="confirm-pw" class="form-control" placeholder="Re-enter new password">
                </div>
              </div>
              <button type="submit" class="btn btn-outline">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/hotels.js"></script>
<script src="assets/js/booking.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initPage();
    initProfilePage();
  });
</script>
</body>
</html>
